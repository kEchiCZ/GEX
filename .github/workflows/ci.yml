# CI: lint + testy Python (engine, api) a frontendu na každý PR a push do main.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gexlens
          POSTGRES_PASSWORD: gexlens
          POSTGRES_DB: gexlens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gexlens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      GEXLENS_TEST_PG_DSN: postgresql+psycopg://gexlens:gexlens@localhost:5432/gexlens
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy engine/src engine/tests api/src api/tests
      - run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format
      - run: npm test
      - run: npm run build
      # Smoke PRODUKČNÍHO bundlu (#154): build se dosud jen stavěl, nikdy nespustil —
      # runtime chyba viditelná jen v produkci (#146, bílá stránka) by prošla
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke
